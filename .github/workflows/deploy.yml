name: Build and Deploy Slides

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install reveal-md
        run: npm install -g reveal-md

      - name: Build slides
        run: |
          cd slides
          chmod +x build
          mkdir -p build
          for md in *.md; do
            if [ -f "$md" ]; then
              reveal-md "$md" \
                --static build \
                --template template.html \
                --css custom.css \
                --css dark.css \
                --highlight-theme monokai-sublime
            fi
          done

      - name: Add CNAME file
        run: echo "slide.jwmc.top" > slides/build/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./slides/build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
